services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermesos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermesos"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    command: npx prisma@6 migrate deploy
    environment:
      DATABASE_URL: postgresql://hermes:hermes@postgres:5432/hermesos
    networks:
      - sentinel_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hermes:hermes@postgres:5432/hermesos
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-https://sentinel.srv1427612.hstgr.cloud}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SENTINEL_DEFAULT_UI: ${SENTINEL_DEFAULT_UI:-true}
      CONTROL_PLANE_OWNERS: ${CONTROL_PLANE_OWNERS:-}
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-http://host.docker.internal:4860}
      HERMES_CLINT_ENDPOINT: ${HERMES_CLINT_ENDPOINT:-http://host.docker.internal:4861}
      HERMES_CLINT_ENABLED: ${HERMES_CLINT_ENABLED:-false}
      OPENCLAW_ENDPOINT: ${OPENCLAW_ENDPOINT:-http://host.docker.internal:50348}
      HERMES_LISA_MODEL: ${HERMES_LISA_MODEL:-claude-sonnet-4-6}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HERMES_CLINT_MODEL: ${HERMES_CLINT_MODEL:-claude-sonnet-4-6}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-claude-opus-4-8}
      AGENT_CONFIG_DIR: /opt/sentinel-os/agents
      AGENT_LOG_DIR: /opt/sentinel-os/logs
    volumes:
      - agent_configs:/opt/sentinel-os/agents
      - agent_logs:/opt/sentinel-os/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    # Traefik routing is managed via /etc/traefik/dynamic/sentinel.yml on the host

networks:
  sentinel_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  agent_configs:
  agent_logs:
