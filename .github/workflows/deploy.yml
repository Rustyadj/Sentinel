name: Deploy to VPS

# Production-gated deployment to VPS.
# Deploys only on manual trigger (`workflow_dispatch`) or on semver tags (v*).
# Requires the Production readiness / deploy-gate workflow check to pass.
# See docs/PRODUCTION_OPERATIONS.md for full requirements.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     - host or IP, e.g. 187.124.66.30
#   VPS_USER     - SSH user, e.g. root
#   VPS_SSH_KEY  - the PRIVATE key whose public half is in the VPS's
#                  ~/.ssh/authorized_keys (generate a dedicated deploy key)
#   VPS_APP_DIR  - absolute path to the app on the VPS (dir with docker-compose.yml)
# Optional:
#   VPS_PORT     - SSH port (defaults to 22)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Resolve immutable commit SHA
        id: sha
        run: |
          SHA="${{ github.sha }}"
          echo "immutable_sha=${SHA}" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short ${SHA} 2>/dev/null || echo ${SHA:0:7})" >> $GITHUB_OUTPUT

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          DEPLOY_SHA: ${{ steps.sha.outputs.immutable_sha }}
          DEPLOY_SHORT: ${{ steps.sha.outputs.commit_short }}
        run: |
          set -euo pipefail

          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_APP_DIR DEPLOY_SHA; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret or variable: $v"
              exit 1
            fi
          done
          PORT="${VPS_PORT:-22}"

          # Write the deploy key and trust the host.
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "==> Deploying immutable commit: ${DEPLOY_SHORT} (${DEPLOY_SHA})"

          # Run the deploy on the VPS. The heredoc is sent over stdin.
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${VPS_APP_DIR}' DEPLOY_SHA='${DEPLOY_SHA}' DEPLOY_SHORT='${DEPLOY_SHORT}' bash -s" <<'REMOTE'
          set -euo pipefail

          APP_DIR="${APP_DIR:?APP_DIR not set}"
          DEPLOY_SHA="${DEPLOY_SHA:?DEPLOY_SHA not set}"
          DEPLOY_SHORT="${DEPLOY_SHORT:?DEPLOY_SHORT not set}"

          cd "$APP_DIR"
          LOGFILE="${APP_DIR}/.vps-deploy.log"

          log() {
            echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOGFILE"
          }

          log "==> DEPLOY START: $DEPLOY_SHORT ($DEPLOY_SHA)"
          log "==> Repo: $(git config --get remote.origin.url)"

          # Fetch latest and verify immutable SHA exists
          git fetch origin --prune
          if ! git rev-parse "$DEPLOY_SHA" >/dev/null 2>&1; then
            log "::error::Immutable SHA not found: $DEPLOY_SHA"
            exit 1
          fi

          # Checkout and reset to exact immutable SHA (not branch tip)
          git checkout "$DEPLOY_SHA" 2>/dev/null || true
          git reset --hard "$DEPLOY_SHA"
          log "==> Now at: $(git log --oneline -1)"

          # Save previous deployment for rollback
          if [ -f .vps-previous-sha ]; then
            PREVIOUS_SHA=$(cat .vps-previous-sha)
            log "==> Previous deployment: $PREVIOUS_SHA"
          fi
          echo "$DEPLOY_SHA" > .vps-previous-sha

          log "==> Rebuilding containers"
          docker compose up -d --build 2>&1 | tee -a "$LOGFILE"

          log "==> Container status"
          docker compose ps 2>&1 | tee -a "$LOGFILE"

          # Fast liveness check
          log "==> Waiting for /api/health (liveness, 30s timeout)"
          HEALTH_OK=0
          for i in $(seq 1 5); do
            if curl -fsS --max-time 5 http://localhost:3000/api/health >/dev/null 2>&1; then
              log "✓ Liveness check passed"
              HEALTH_OK=1
              break
            fi
            log "  attempt $i/5, retrying in 6s…"
            sleep 6
          done

          if [ $HEALTH_OK -eq 0 ]; then
            log "::error::Liveness check (/api/health) failed"
            docker compose logs --tail=50 app 2>&1 | tee -a "$LOGFILE"
            log "==> ROLLBACK: restoring previous deployment"
            if [ -n "${PREVIOUS_SHA:-}" ]; then
              git reset --hard "$PREVIOUS_SHA"
              docker compose up -d --build
              log "✓ Rolled back to $PREVIOUS_SHA"
            fi
            exit 1
          fi

          # Full readiness check
          log "==> Waiting for /api/ready (readiness, 2min timeout)"
          READY_OK=0
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 http://localhost:3000/api/ready >/dev/null 2>&1; then
              log "✓ Readiness check passed"
              READY_OK=1
              break
            fi
            log "  attempt $i/20 ($(( i * 6 ))s elapsed), retrying in 6s…"
            sleep 6
          done

          if [ $READY_OK -eq 0 ]; then
            log "::error::Readiness check (/api/ready) failed after 2 minutes"
            docker compose logs --tail=100 app 2>&1 | tee -a "$LOGFILE"
            log "==> AUTOMATIC ROLLBACK: restoring previous deployment"
            if [ -n "${PREVIOUS_SHA:-}" ]; then
              git reset --hard "$PREVIOUS_SHA"
              docker compose up -d --build
              sleep 10
              if curl -fsS --max-time 5 http://localhost:3000/api/ready >/dev/null 2>&1; then
                log "✓ Rollback successful, previous deployment is ready"
              else
                log "::error::CRITICAL: Rollback failed, previous deployment not ready"
              fi
            fi
            exit 1
          fi

          # Verify stability (basic check that app doesn't crash immediately)
          log "==> Verifying deployment stability (sampling for 30s)"
          for i in $(seq 1 3); do
            sleep 10
            if ! curl -fsS http://localhost:3000/api/ready >/dev/null 2>&1; then
              log "::error::Stability check failed at $((i * 10))s"
              exit 1
            fi
          done

          log "==> DEPLOY COMPLETE: $DEPLOY_SHORT is live"
          log "==> Deployment time: $(date +'%Y-%m-%d %H:%M:%S')"
          REMOTE

      - name: Mark deployment successful
        if: success()
        run: echo "✓ Production deployment successful"

      - name: Report deployment failure
        if: failure()
        run: echo "::error::Deployment failed — manual investigation required"
