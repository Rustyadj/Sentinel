name: Production readiness

on:
  pull_request:
  push:
    branches: [main, production/sentinel-operational-hardening]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@127.0.0.1:5432/sentinel_test
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only
      AUTH_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma migrate status
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --target runner -t sentinel-os:ci .

  smoke:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@127.0.0.1:5432/sentinel_test
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only
      AUTH_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx prisma generate && npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  deploy-gate:
    if: always()
    needs: [verify, docker, smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Block deployment unless every required check passed
        run: |
          test "${{ needs.verify.result }}" = success
          test "${{ needs.docker.result }}" = success
          test "${{ needs.smoke.result }}" = success
